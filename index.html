<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Messenger Clone - Interconnected</title>
    <!-- FontAwesome for Messenger-like icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --messenger-blue: #0084FF;
            --bg-light: #fff;
            --bg-gray: #f0f2f5;
            --text-dark: #050505;
            --text-muted: #65676B;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-container {
            width: 100%;
            height: 100%;
            max-width: 420px;
            background: var(--bg-light);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            bottom: 0;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0,0,0,0.2);
        }

        @media (min-width: 425px) {
            .phone-container {
                position: relative;
                height: 840px;
                border-radius: 30px;
            }
        }

        .screen {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            overflow: hidden;
        }

        .screen.active {
            display: flex;
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            background: #fff;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 9999;
        }

        .splash-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .splash-logo {
            font-size: 90px;
            background: linear-gradient(45deg, #0066ff, #00c6ff, #0084FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite ease-in-out;
        }

        .splash-btn {
            background: var(--messenger-blue);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            justify-content: center;
            align-items: center;
            padding: 30px;
            background: linear-gradient(180deg, #fff 60%, #f0f2f5 100%);
        }

        .login-logo {
            font-size: 70px;
            background: linear-gradient(45deg, #0066ff, #00c6ff, #0084FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .login-input {
            width: 100%;
            padding: 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            background: var(--bg-gray);
            outline: none;
        }

        .login-btn {
            background-color: var(--messenger-blue);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .login-hint {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 15px;
            line-height: 1.4;
        }

        /* --- CHATS LIST SCREEN --- */
        .app-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .current-user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .header-title {
            font-size: 24px;
            font-weight: 800;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .header-icon {
            background: var(--bg-gray);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            cursor: pointer;
        }

        .search-bar-container {
            padding: 10px 15px;
            flex-shrink: 0;
        }

        .search-bar {
            background: var(--bg-gray);
            padding: 10px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
        }

        .search-bar input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
        }

        .chats-container {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .chat-row {
            display: flex;
            padding: 12px 15px;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .chat-row:hover {
            background-color: var(--bg-gray);
        }

        .avatar-container {
            position: relative;
        }

        .avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
        }

        .group-avatar-wrapper {
            width: 55px;
            height: 55px;
            position: relative;
        }

        .group-avatar-1 {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
            border: 2px solid white;
            z-index: 2;
        }

        .group-avatar-2 {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            right: 0;
            border: 2px solid white;
            z-index: 1;
        }

        .status-dot {
            width: 14px;
            height: 14px;
            background-color: #45bd62;
            border: 2px solid #fff;
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
            right: 2px;
        }

        .chat-info {
            flex: 1;
            border-bottom: 1px solid #f5f5f5;
            padding-bottom: 8px;
            overflow: hidden;
        }

        .chat-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
            color: var(--text-dark);
        }

        .chat-preview {
            font-size: 14px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- ACTIVE CONVERSATION SCREEN --- */
        .chat-header {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px solid #f0f0f0;
            gap: 10px;
            flex-shrink: 0;
        }

        .back-btn {
            font-size: 20px;
            color: var(--messenger-blue);
            cursor: pointer;
            padding-right: 5px;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-status {
            font-size: 12px;
            color: var(--text-muted);
        }

        .chat-header-icons {
            display: flex;
            gap: 20px;
            color: var(--messenger-blue);
            font-size: 20px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #fff;
        }

        .msg-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .msg-wrapper.received {
            align-items: flex-start;
        }

        .msg-wrapper.sent {
            align-items: flex-end;
        }

        .sender-name-tag {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 2px;
            margin-left: 8px;
        }

        .message-row-core {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 75%;
        }

        .mini-msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        .message {
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-break: break-word;
        }

        .msg-wrapper.received .message {
            background-color: var(--bg-gray);
            color: var(--text-dark);
        }

        .msg-wrapper.sent .message {
            background-color: var(--messenger-blue);
            color: white;
        }

        .chat-input-area {
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-top: 1px solid #f0f0f0;
            background: #fff;
            flex-shrink: 0;
        }

        .chat-input-icons {
            display: flex;
            gap: 15px;
            color: var(--messenger-blue);
            font-size: 20px;
        }

        .input-wrapper {
            flex: 1;
            background: var(--bg-gray);
            border-radius: 20px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            font-size: 15px;
        }

        .send-btn {
            color: var(--messenger-blue);
            font-size: 20px;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>

    <div class="phone-container" id="app-container">

        <!-- 0. SPLASH LAUNCH SCREEN -->
        <div id="splash-screen" class="screen active" onclick="initializeFullscreenApp()">
            <div class="splash-content">
                <div class="splash-logo"><i class="fab fa-facebook-messenger"></i></div>
                <button class="splash-btn">Open Messenger</button>
            </div>
        </div>

        <!-- 1. LOGIN SCREEN -->
        <div id="login-screen" class="screen">
            <div class="login-logo"><i class="fab fa-facebook-messenger"></i></div>
            <div class="login-form">
                <input type="text" id="username" class="login-input" placeholder="Username" value="user1">
                <input type="password" id="password" class="login-input" placeholder="Password" value="pass123">
                <button type="button" class="login-btn" onclick="handleLogin()">Log In</button>
            </div>
            <div class="login-hint">
                <strong>Log into either account to chat with the other:</strong><br>
                user1 / pass123 (Michael)<br>
                user2 / secure456 (Emma)
            </div>
        </div>

        <!-- 2. CHATS LIST SCREEN -->
        <div id="list-screen" class="screen">
            <div class="app-header">
                <div class="header-left">
                    <img id="current-user-img" src="" alt="Me" class="current-user-avatar">
                    <div class="header-title" id="header-display-name">Chats</div>
                </div>
                <div class="header-actions">
                    <div class="header-icon" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></div>
                </div>
            </div>
            <div class="search-bar-container">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search">
                </div>
            </div>
            <div class="chats-container" id="chats-list">
                <!-- Programmatically populated lists live here -->
            </div>
        </div>

        <!-- 3. CHAT WINDOW WINDOW -->
        <div id="chat-screen" class="screen">
            <div class="chat-header">
                <div class="back-btn" onclick="showListScreen()"><i class="fas fa-arrow-left"></i></div>
                <div id="header-avatar-slot"></div>
                <div class="chat-header-info">
                    <div id="active-name" class="chat-name" style="font-size:15px; margin:0;">Name</div>
                    <div class="chat-header-status" id="active-status">Active now</div>
                </div>
                <div class="chat-header-icons">
                    <i class="fas fa-phone-alt"></i>
                    <i class="fas fa-video"></i>
                </div>
            </div>

            <div class="messages-area" id="messages-stream"></div>

            <div class="chat-input-area">
                <div class="chat-input-icons" id="input-addons">
                    <i class="fas fa-plus-circle"></i>
                    <i class="fas fa-camera"></i>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="message-input" placeholder="Aa" oninput="toggleSendBtn()">
                </div>
                <div class="send-btn" id="send-icon" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- MULTIPLE CREDENTIAL DATABASE ---
        const allowedUsers = {
            "user1": { id: "user1", name: "Michael", avatar: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=150", password: "pass123" },
            "user2": { id: "user2", name: "Emma", avatar: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=150", password: "secure456" }
        };

        // --- SYSTEM CORE CENTRAL DATA STORE ---
        const defaultConversations = {
            "group_project": {
                id: "group_project",
                isGroup: true,
                name: "Web Dev Group Project 🚀",
                participants: ["user1", "user2", "bot_john"],
                messages: [
                    { senderId: "bot_john", senderName: "John Doe", text: "Hey guys! Welcome to the group chat." },
                    { senderId: "user1", senderName: "Michael", text: "Awesome, now Emma can join the planning too." }
                ]
            },
            "p2p_user1_user2": {
                id: "p2p_user1_user2",
                isGroup: false,
                name: "Emma", // dynamic fallback based on active context
                messages: [
                    { senderId: "user1", senderName: "Michael", text: "Hey Emma, did you see my commit on GitHub?" },
                    { senderId: "user2", senderName: "Emma", text: "Just saw it! Looks great." }
                ]
            },
            "p2p_bot_john": {
                id: "p2p_bot_john",
                isGroup: false,
                name: "John Doe",
                avatar: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150",
                messages: [
                    { senderId: "bot_john", senderName: "John Doe", text: "Hey! Let me know if you need any feedback on the design code." }
                ]
            }
        };

        let activeConversations = JSON.parse(localStorage.getItem('msg_interconnected_v1')) || defaultConversations;
        let loggedInUser = null;
        let activeChatId = null;

        function saveState() {
            localStorage.setItem('msg_interconnected_v1', JSON.stringify(activeConversations));
        }

        function changeScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function initializeFullscreenApp() {
            const container = document.documentElement;
            if (container.requestFullscreen) container.requestFullscreen();
            else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
            changeScreen('login-screen');
        }

        function handleLogin() {
            const uField = document.getElementById('username').value.trim();
            const pField = document.getElementById('password').value;

            if (allowedUsers[uField] && allowedUsers[uField].password === pField) {
                loggedInUser = allowedUsers[uField];
                document.getElementById('current-user-img').src = loggedInUser.avatar;
                document.getElementById('header-display-name').innerText = loggedInUser.name;
                changeScreen('list-screen');
                renderChatList();
            } else {
                alert("Invalid user validation profile parameters.");
            }
        }

        function handleLogout() {
            loggedInUser = null;
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            changeScreen('splash-screen');
        }

        function showListScreen() {
            changeScreen('list-screen');
            renderChatList();
        }

        // --- RENDER RE-ENGINEERED CONVERSATIONS LIST ---
        function renderChatList() {
            const listContainer = document.getElementById('chats-list');
            listContainer.innerHTML = '';

            Object.values(activeConversations).forEach(chat => {
                let chatTitle = chat.name;
                let chatAvatarHTML = '';
                
                // P2P formatting fallback adjustments based on identity matrix
                if (!chat.isGroup) {
                    if (chat.id === "p2p_user1_user2") {
                        const peer = (loggedInUser.id === "user1") ? allowedUsers["user2"] : allowedUsers["user1"];
                        chatTitle = peer.name;
                        chatAvatarHTML = `<div class="avatar-container"><img src="${peer.avatar}" class="avatar"><div class="status-dot"></div></div>`;
                    } else {
                        chatAvatarHTML = `<div class="avatar-container"><img src="${chat.avatar}" class="avatar"><div class="status-dot"></div></div>`;
                    }
                } else {
                    // Group chat avatar overlay graphic rules
                    chatAvatarHTML = `
                        <div class="group-avatar-wrapper">
                            <img src="${allowedUsers['user1'].avatar}" class="group-avatar-1">
                            <img src="${allowedUsers['user2'].avatar}" class="group-avatar-2">
                        </div>
                    `;
                }

                const lastMsg = chat.messages[chat.messages.length - 1];
                const preview = lastMsg ? `${lastMsg.senderName}: ${lastMsg.text}` : "No messages yet";

                const row = document.createElement('div');
                row.className = 'chat-row';
                row.onclick = () => openChatWindow(chat.id);
                row.innerHTML = `
                    ${chatAvatarHTML}
                    <div class="chat-info">
                        <div class="chat-name">${chatTitle}</div>
                        <div class="chat-preview">${preview}</div>
                    </div>
                `;
                listContainer.appendChild(row);
            });
        }

        // --- ACTIVE CHAT FLOW MANAGEMENT ---
        function openChatWindow(id) {
            activeChatId = id;
            const chat = activeConversations[id];
            const slot = document.getElementById('header-avatar-slot');
            
            let displayTitle = chat.name;

            if (chat.isGroup) {
                document.getElementById('active-status').innerText = "Michael, Emma, John";
                slot.innerHTML = `
                    <div class="group-avatar-wrapper" style="width:40px; height:40px;">
                        <img src="${allowedUsers['user1'].avatar}" class="group-avatar-1" style="width:26px; height:26px;">
                        <img src="${allowedUsers['user2'].avatar}" class="group-avatar-2" style="width:26px; height:26px;">
                    </div>
                `;
            } else {
                document.getElementById('active-status').innerText = "Active now";
                let targetImg = chat.avatar;
                if (chat.id === "p2p_user1_user2") {
                    const peer = (loggedInUser.id === "user1") ? allowedUsers["user2"] : allowedUsers["user1"];
                    displayTitle = peer.name;
                    targetImg = peer.avatar;
                }
                slot.innerHTML = `<img src="${targetImg}" class="avatar" style="width:40px; height:40px;">`;
            }

            document.getElementById('active-name').innerText = displayTitle;
            renderMessagesStream();
            changeScreen('chat-screen');
        }

        function renderMessagesStream() {
            const stream = document.getElementById('messages-stream');
            stream.innerHTML = '';
            
            const chat = activeConversations[activeChatId];
            
            chat.messages.forEach(msg => {
                const isMe = (msg.senderId === loggedInUser.id);
                const wrapper = document.createElement('div');
                wrapper.className = `msg-wrapper ${isMe ? 'sent' : 'received'}`;

                // Calculate which profile picture icon image to show next to incoming text bubbles
                let avatarSrc = "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150"; // system baseline default fallback
                if (allowedUsers[msg.senderId]) {
                    avatarSrc = allowedUsers[msg.senderId].avatar;
                } else if (msg.senderId === "bot_john") {
                    avatarSrc = "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150";
                }

                let senderLabel = "";
                let avatarHTML = "";
                
                if (!isMe) {
                    if (chat.isGroup) {
                        senderLabel = `<span class="sender-name-tag">${msg.senderName}</span>`;
                    }
                    avatarHTML = `<img src="${avatarSrc}" class="mini-msg-avatar">`;
                }

                wrapper.innerHTML = `
                    ${senderLabel}
                    <div class="message-row-core">
                        ${avatarHTML}
                        <div class="message">${msg.text}</div>
                    </div>
                `;
                stream.appendChild(wrapper);
            });

            stream.scrollTop = stream.scrollHeight;
        }

        function toggleSendBtn() {
            const input = document.getElementById('message-input');
            const sendIcon = document.getElementById('send-icon');
            const addons = document.getElementById('input-addons');
            
            if (input.value.trim() !== '') {
                sendIcon.style.display = 'block';
                addons.style.display = 'none';
            } else {
                sendIcon.style.display = 'none';
                addons.style.display = 'flex';
            }
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;

            const targetChatId = activeChatId;

            // Commit sent message into state registry under active actor signature identity
            activeConversations[targetChatId].messages.push({
                senderId: loggedInUser.id,
                senderName: loggedInUser.name,
                text: text
            });

            input.value = '';
            toggleSendBtn();
            renderMessagesStream();
            saveState();

            // Fire custom bot response rules if messaging automated John Doe channel
            if (targetChatId === "p2p_bot_john") {
                setTimeout(() => {
                    if (activeChatId !== "p2p_bot_john") return;
                    activeConversations["p2p_bot_john"].messages.push({
                        senderId: "bot_john",
                        senderName: "John Doe",
                        text: `Hey ${loggedInUser.name}! I received your private message. Let's touch base inside our Web Dev Group Project chat room instead!`
                    });
                    renderMessagesStream();
                    saveState();
                }, 1200);
            }
        }

        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
